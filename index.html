<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FARAH'S GAME 🌸</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@700;900&display=swap');
:root{--gold:#f9a825;--gold2:#ff6b35;--red:#ff4444;--green:#00e676;--blue:#40c4ff;--bg:#fef6ff;--card:#fff0f5;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:linear-gradient(135deg,#fce4ec,#e8eaf6);display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Tajawal',sans-serif;overflow:hidden;}
#app{position:relative;width:min(480px,100vw);height:min(760px,100dvh);border-radius:clamp(0px,4vw,28px);overflow:hidden;box-shadow:0 0 0 1px #ffffff0a,0 0 80px #f9a82522,0 40px 120px #00000088;}
canvas{display:block;width:100%;height:100%;}
#hud{position:absolute;top:0;left:0;right:0;padding:14px 20px 0 64px;pointer-events:none;z-index:10;}
#hud-top{display:flex;justify-content:space-between;align-items:center;}
#score-display{font-family:'Orbitron',sans-serif;font-size:1.7rem;font-weight:900;color:#880e4f;text-shadow:0 0 20px #f48fb1;}
#lives-display{font-size:1.3rem;letter-spacing:3px;}
#hud-bar{margin-top:8px;display:flex;align-items:center;gap:10px;}
#level-badge{font-family:'Orbitron',sans-serif;font-size:0.62rem;font-weight:700;color:#9c27b0;background:#f3e5f5;border:1px solid #ce93d8;border-radius:20px;padding:3px 10px;white-space:nowrap;}
#coin-count{font-size:.85rem;color:#e91e8c;font-weight:700;}
.popup{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:50;transition:opacity .3s,transform .3s;}
.popup.hidden{opacity:0;pointer-events:none;transform:scale(.96);}
#menu-screen{background:linear-gradient(160deg,#fce4ec,#f3e5f5 50%,#e8eaf6);gap:10px;}
.logo-icon{font-size:2.6rem;animation:float 3s ease-in-out infinite;display:block;margin-bottom:2px;text-align:center;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.logo-title{font-family:'Orbitron',sans-serif;font-size:2rem;font-weight:900;background:linear-gradient(135deg,#f9a825,#ff6b35,#ffcc02);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 20px #f9a82566);line-height:1.1;text-align:center;}
.logo-sub{font-size:.8rem;color:#c77daa;margin-top:2px;letter-spacing:2px;text-transform:uppercase;text-align:center;}
.best-tag{background:#f9a82518;border:1px solid #f9a82544;border-radius:12px;padding:6px 18px;font-size:.85rem;color:var(--gold);font-weight:700;}
.btn-primary{padding:13px 48px;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:50px;font-family:'Tajawal',sans-serif;font-size:1.2rem;font-weight:900;color:#fff;cursor:pointer;box-shadow:0 8px 32px #f9a82555,inset 0 1px 0 #ffffff33;transition:transform .15s,box-shadow .15s;}
.btn-primary:hover{transform:scale(1.05);box-shadow:0 12px 40px #f9a82577;}
.btn-primary:active{transform:scale(.97);}
.btn-secondary{padding:11px 32px;background:transparent;border:1px solid #ffffff22;border-radius:50px;font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:700;color:#ffffff88;cursor:pointer;transition:all .2s;}
.btn-secondary:hover{border-color:#ffffff55;color:#fff;}
.ctrl-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.ctrl-chip{background:#ffffff08;border:1px solid #ffffff15;border-radius:8px;padding:5px 13px;font-size:.82rem;color:#ffffff55;}
#lb-screen{background:#f3e5f5ee;backdrop-filter:blur(12px);}
.lb-title{font-family:'Orbitron',sans-serif;font-size:1.5rem;font-weight:900;color:#9c27b0;text-shadow:0 0 20px #ce93d8;}
#lb-list{width:88%;display:flex;flex-direction:column;gap:8px;}
.lb-row{display:flex;align-items:center;gap:12px;background:#ffffff08;border:1px solid #ffffff0f;border-radius:14px;padding:12px 16px;}
.lb-row.gold{background:#f9a82515;border-color:#f9a82533;}
.lb-row.silver{background:#9e9e9e12;border-color:#9e9e9e33;}
.lb-row.bronze{background:#cd7f3215;border-color:#cd7f3233;}
.lb-rank{font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:900;width:30px;}
.lb-name{flex:1;font-size:1rem;font-weight:700;color:#880e4f;}
.lb-pts{font-family:'Orbitron',sans-serif;font-size:.95rem;color:var(--gold);font-weight:700;}
#lvlup-banner{position:absolute;top:90px;left:50%;transform:translateX(-50%) translateY(-20px);background:linear-gradient(135deg,#1a0a2e,#0d1b3e);border:1px solid var(--gold);border-radius:16px;padding:12px 28px;text-align:center;pointer-events:none;z-index:40;opacity:0;transition:opacity .3s,transform .3s;box-shadow:0 0 30px #f9a82533;}
#lvlup-banner.show{opacity:1;transform:translateX(-50%) translateY(0);}
#lvlup-banner h3{font-family:'Orbitron',sans-serif;font-size:1.1rem;color:var(--gold);font-weight:900;}
#lvlup-banner p{font-size:.85rem;color:#aaa;margin-top:2px;}
#gameover-screen{background:#fce4ecf0;backdrop-filter:blur(16px);}
.go-title{font-family:'Orbitron',sans-serif;font-size:2rem;font-weight:900;color:#e91e8c;text-shadow:0 0 30px #f48fb1;}
.go-card{background:#ffffff88;border:1px solid #f48fb1;border-radius:20px;padding:20px 40px;text-align:center;}
.go-card .lbl{font-size:.85rem;color:#c2185b;margin-bottom:4px;}
.go-card .val{font-family:'Orbitron',sans-serif;font-size:2rem;font-weight:900;color:#880e4f;}
.go-stats{display:flex;gap:20px;}
.go-stat{text-align:center;}
.go-stat .sv{font-family:'Orbitron',sans-serif;font-size:1.1rem;color:#9c27b0;font-weight:700;}
.go-stat .sl{font-size:.75rem;color:#ab47bc;margin-top:2px;}
#pause-btn{position:absolute;top:14px;left:20px;z-index:20;background:#ffffff22;border:1px solid #ffffff33;border-radius:12px;width:38px;height:38px;font-size:1.1rem;cursor:pointer;display:none;align-items:center;justify-content:center;color:#fff;transition:background .2s;}
#pause-btn:hover{background:#ffffff44;}
#pause-screen{background:#000000cc;backdrop-filter:blur(10px);}
.pause-title{font-family:'Orbitron',sans-serif;font-size:2rem;font-weight:900;color:#f9a825;text-shadow:0 0 20px #f9a82588;}
#reward-popup{position:absolute;inset:0;background:#000000cc;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:60;opacity:0;pointer-events:none;transition:opacity .3s;}
#reward-popup.show{opacity:1;pointer-events:none;}
.r-icon{font-size:4rem;animation:pop .5s cubic-bezier(.17,.67,.35,1.4);}
@keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
.r-title{font-family:'Orbitron',sans-serif;font-size:1.4rem;color:#fff;font-weight:900;}
.r-desc{font-size:1rem;color:#aaa;text-align:center;}

/* SHOP */
#shop-screen{background:linear-gradient(160deg,#fce4ec,#f3e5f5 60%,#e8eaf6);overflow-y:auto;}
.shop-title{font-family:'Orbitron',sans-serif;font-size:1.5rem;font-weight:900;color:#880e4f;text-shadow:0 0 15px #f48fb1;}
.shop-coins-bar{background:#fff0f5;border:1.5px solid #f48fb1;border-radius:20px;padding:7px 22px;font-size:1rem;font-weight:900;color:#e91e8c;}
.shop-section-title{font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:900;color:#9c27b0;align-self:flex-start;padding-right:16px;margin-bottom:-8px;}
.shop-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:92%;padding:0 4px;}
.shop-item{background:#fff8fc;border:2px solid #f8bbd0;border-radius:16px;padding:10px 6px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;transition:all .18s;position:relative;}
.shop-item:active{transform:scale(.95);}
.shop-item.owned{border-color:#a5d6a7;background:#f1f8e9;}
.shop-item.selected{border-color:#f9a825;background:#fff8e1;box-shadow:0 0 14px #f9a82555;}
.shop-item.locked{opacity:.6;filter:grayscale(.4);}
.shop-canvas{border-radius:10px;background:#fce4ec;}
.shop-item-name{font-size:.75rem;font-weight:700;color:#880e4f;text-align:center;}
.shop-item-price{font-size:.72rem;color:#e91e8c;font-weight:700;}
.shop-badge{position:absolute;top:4px;left:4px;font-size:.6rem;font-weight:900;border-radius:8px;padding:2px 6px;}
.shop-badge.owned{background:#a5d6a7;color:#2e7d32;}
.shop-badge.selected{background:#f9a825;color:#fff;}
.shop-badge.locked{background:#f8bbd0;color:#c2185b;}
.shop-notify{position:absolute;top:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 20px;border-radius:20px;font-size:.85rem;font-weight:700;opacity:0;pointer-events:none;transition:opacity .3s;z-index:100;white-space:nowrap;}
.shop-notify.show{opacity:1;}
</style>
</head>
<body>
<div id="app">
  <canvas id="canvas" width="480" height="760"></canvas>
  <button id="pause-btn">⏸</button>
  <div id="hud">
    <div id="hud-top">
      <div id="score-display">0</div>
      <div id="lives-display">❤️❤️❤️❤️❤️</div>
    </div>
    <div id="hud-bar">
      <div id="level-badge">المرحلة 1</div>
      <div id="xp-bar-wrap"><div id="xp-bar"></div></div>
      <div id="coin-count">🪙 0</div>
    </div>
  </div>
  <div id="lvlup-banner"><h3>⬆️ مرحلة جديدة!</h3><p id="lvlup-text"></p></div>
  <div id="reward-popup">
    <div class="r-icon" id="r-icon">🏆</div>
    <div class="r-title" id="r-title">إنجاز!</div>
    <div class="r-desc" id="r-desc"></div>
  </div>
  <!-- MENU -->
  <div class="popup" id="menu-screen">
    <span class="logo-icon">🌸</span>
    <div><div class="logo-title">FARAH'S<br>GAME</div><div class="logo-sub">العبي وانتصري</div></div>
    <div class="best-tag" id="menu-best">🏆 أفضل نتيجة: 0</div>
    <button class="btn-primary" id="startBtn">▶ العب الآن</button>
    <div style="display:flex;gap:12px;">
      <button class="btn-secondary" id="shopBtn">🛍️ المتجر</button>
      <button class="btn-secondary" id="lbBtn">📊 الأوائل</button>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-chip">← → للتحرك</span>
      <span class="ctrl-chip">↑ Space للقفز</span>
      <span class="ctrl-chip">سحب على الشاشة</span>
    </div>
  </div>
  <!-- SHOP -->
  <div class="popup hidden" id="shop-screen">
    <div class="shop-notify" id="shop-notify"></div>
    <div class="shop-title">🛍️ المتجر</div>
    <div class="shop-coins-bar" id="shop-coins-bar">🪙 0</div>
    <div class="shop-section-title">👧 الشخصيات</div>
    <div class="shop-grid" id="char-grid"></div>
    <div class="shop-section-title">🍩 شكل الكوينز</div>
    <div class="shop-grid" id="coin-grid"></div>
    <button class="btn-secondary" id="shop-back">← رجوع</button>
  </div>
  <!-- LEADERBOARD -->
  <div class="popup hidden" id="lb-screen">
    <div class="lb-title">🏆 لوحة الأوائل</div>
    <div id="lb-list"></div>
    <button class="btn-secondary" id="lb-back">← رجوع</button>
  </div>
  <!-- PAUSE -->
  <div class="popup hidden" id="pause-screen">
    <div class="pause-title">⏸ متوقفة</div>
    <button class="btn-primary" id="resumeBtn">▶ استمري</button>
    <button class="btn-secondary" id="pause-menu">🏠 القائمة الرئيسية</button>
  </div>
  <!-- GAME OVER -->
  <div class="popup hidden" id="gameover-screen">
    <div class="go-title" id="go-title">💥 انتهت اللعبة</div>
    <div class="go-card"><div class="lbl">نتيجتك</div><div class="val" id="go-score">0</div></div>
    <div class="go-stats">
      <div class="go-stat"><div class="sv" id="go-best">0</div><div class="sl">🏆 أعلى نتيجة</div></div>
      <div class="go-stat"><div class="sv" id="go-coins">0</div><div class="sl">🪙 كوينز</div></div>
      <div class="go-stat"><div class="sv" id="go-level">1</div><div class="sl">📍 المرحلة</div></div>
    </div>
    <button class="btn-primary" id="restartBtn">🔄 العب مجدداً</button>
    <button class="btn-secondary" id="go-lb">📊 الأوائل</button>
  </div>
</div>
<script>
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
const W=480,H=760;

// ── SHOP DATA ─────────────────────────────────────────
const CHARACTERS=[
  {id:'princess', name:'أميرة',    price:0,    draw:drawPrincess},
  {id:'fairy',    name:'جنية',     price:80,   draw:drawFairy},
  {id:'fox',      name:'ثعلبة',    price:150,  draw:drawFox},
  {id:'cat',      name:'قطة',      price:200,  draw:drawCat},
  {id:'astronaut',name:'رائدة',    price:300,  draw:drawAstronaut},
  {id:'star',     name:'نجمة',     price:400,  draw:drawStar},
  {id:'mermaid',  name:'حورية',    price:500,  draw:drawMermaid},
  {id:'butterfly',name:'فراشة',    price:700,  draw:drawButterfly},
];
const COIN_SKINS=[
  {id:'coin',   name:'كوينز',    price:0,   draw:drawCoinSkin},
  {id:'donut',  name:'دونات',    price:250, draw:drawDonutSkin},
];

let shopData={owned:['princess','coin'],selectedChar:'princess',selectedCoin:'coin',totalCoins:0};
function loadShop(){try{const d=JSON.parse(localStorage.getItem('fg_shop')||'null');if(d)shopData=d;}catch(e){}}
function saveShop(){try{localStorage.setItem('fg_shop',JSON.stringify(shopData));}catch(e){}}
loadShop();

// ── LEVELS ────────────────────────────────────────────
const LEVELS=[
  {name:'الحديقة', speed:0.8, spawnRate:160,bgTop:'#fffde7',bgBot:'#f0f4c3',gc:'#a5d6a7',gd:'#81c784',xpNeeded:300},
  {name:'البحر',   speed:1.0, spawnRate:148,bgTop:'#e3f2fd',bgBot:'#bbdefb',gc:'#90caf9',gd:'#64b5f6',xpNeeded:700},
  {name:'الغروب', speed:1.2, spawnRate:136,bgTop:'#fce4ec',bgBot:'#f8bbd0',gc:'#f48fb1',gd:'#f06292',xpNeeded:1300},
  {name:'السحاب', speed:1.5, spawnRate:124,bgTop:'#f3e5f5',bgBot:'#e1bee7',gc:'#ce93d8',gd:'#ba68c8',xpNeeded:2100},
  {name:'الحلم',  speed:1.8, spawnRate:112,bgTop:'#e8eaf6',bgBot:'#c5cae9',gc:'#9fa8da',gd:'#7986cb',xpNeeded:99999},
];
const OB_TYPES=[
  ['cactus','rock'],
  ['cactus','rock','boulder'],
  ['rock','boulder','ghost'],
  ['fire_rock','lava','fire_car'],
  ['meteor','alien','laser'],
];

let score,coins,lives,xp,levelIdx,gameRunning,gamePaused;
let playerLane,jumping,jumpV,jumpY;
let obstacles,coinItems,particles,stars;
let frame,lastOb,lastCoin,speed;
let invincible,invTimer,touchStartX,touchStartY;
let loopId=null;
const LANE_X=[80,240,400],GROUND_Y=H-150;

function getLB(){try{return JSON.parse(localStorage.getItem('dr_lb2')||'[]');}catch(e){return[];}}
function saveLB(s,l){
  const lb=getLB();
  lb.push({score:s,level:l,date:new Date().toLocaleDateString('ar')});
  lb.sort((a,b)=>b.score-a.score);
  const top=lb.slice(0,10);
  try{localStorage.setItem('dr_lb2',JSON.stringify(top));}catch(e){}
  return top;
}
function getBest(){const lb=getLB();return lb.length?lb[0].score:0;}
function buildStars(n,maxY){return Array.from({length:n},()=>({x:Math.random()*W,y:Math.random()*maxY,r:Math.random()*1.5+.3,a:Math.random()*Math.PI*2}));}

function init(){
  score=0;coins=0;lives=5;xp=0;levelIdx=0;
  playerLane=1;jumping=false;jumpV=0;jumpY=0;
  obstacles=[];coinItems=[];particles=[];
  frame=0;lastOb=60;lastCoin=60;
  invincible=true;invTimer=120;
  gamePaused=false;
  speed=LEVELS[0].speed;
  stars=buildStars(80,GROUND_Y*.75);
  updateHUD();
}

function updateHUD(){
  document.getElementById('score-display').textContent=score;
  const h=['','❤️','❤️❤️','❤️❤️❤️','❤️❤️❤️❤️','❤️❤️❤️❤️❤️'];
  document.getElementById('lives-display').textContent=h[Math.max(0,Math.min(5,lives))];
  const lv=LEVELS[levelIdx];
  document.getElementById('level-badge').textContent=`المرحلة ${levelIdx+1}: ${lv.name}`;
  document.getElementById('xp-bar').style.width=Math.min(100,(xp/lv.xpNeeded)*100)+'%';
  document.getElementById('coin-count').textContent=`🪙 ${coins}`;
}

// ── Draw Background ──────────────────────────────────
function drawBg(){
  const lv=LEVELS[levelIdx];
  const g=ctx.createLinearGradient(0,0,0,GROUND_Y);
  g.addColorStop(0,lv.bgTop);g.addColorStop(1,lv.bgBot);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  const sa=levelIdx>=2?1:.55;
  stars.forEach(s=>{
    s.a+=.009;ctx.globalAlpha=(Math.sin(s.a)*.4+.6)*sa;
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;
  if(levelIdx<3){
    ctx.fillStyle='#fff8e1';ctx.shadowColor='#fff8e1';ctx.shadowBlur=25;
    ctx.beginPath();ctx.arc(60,65,24,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=lv.bgTop;ctx.beginPath();ctx.arc(72,58,19,0,Math.PI*2);ctx.fill();
  }else if(levelIdx===3){
    ctx.shadowColor='#ff6600';ctx.shadowBlur=40;ctx.fillStyle='#ff6600';
    ctx.beginPath();ctx.arc(60,65,26,0,Math.PI*2);ctx.fill();
    ctx.shadowColor='#ffcc00';ctx.shadowBlur=20;ctx.fillStyle='#ffcc00';
    ctx.beginPath();ctx.arc(60,65,18,0,Math.PI*2);ctx.fill();
  }else{
    ctx.shadowColor='#40c4ff';ctx.shadowBlur=30;ctx.fillStyle='#1a3a6e';
    ctx.beginPath();ctx.arc(60,65,26,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#40c4ff66';ctx.lineWidth=4;
    ctx.beginPath();ctx.ellipse(60,65,42,12,.4,0,Math.PI*2);ctx.stroke();
  }
  ctx.shadowBlur=0;
  ctx.fillStyle='#00000033';
  ctx.beginPath();ctx.moveTo(0,GROUND_Y);
  ctx.bezierCurveTo(100,GROUND_Y-70,200,GROUND_Y-90,300,GROUND_Y-55);
  ctx.bezierCurveTo(380,GROUND_Y-25,440,GROUND_Y-75,480,GROUND_Y-45);
  ctx.lineTo(480,GROUND_Y);ctx.closePath();ctx.fill();
}

function drawGround(){
  const lv=LEVELS[levelIdx];
  const g=ctx.createLinearGradient(0,GROUND_Y,0,H);
  g.addColorStop(0,lv.gc);g.addColorStop(1,lv.gd);
  ctx.fillStyle=g;ctx.fillRect(0,GROUND_Y,W,H-GROUND_Y);
  if(levelIdx>=3){
    for(let i=0;i<8;i++){
      const fx=(frame*2.5+i*60)%W;
      ctx.globalAlpha=.25;ctx.fillStyle='#ff6600';
      ctx.beginPath();ctx.moveTo(fx,GROUND_Y);
      ctx.quadraticCurveTo(fx+10,GROUND_Y-16+Math.sin(frame*.12+i)*5,fx+20,GROUND_Y);
      ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  ctx.strokeStyle='#ffffff18';ctx.lineWidth=2;ctx.setLineDash([22,16]);
  ctx.lineDashOffset=-(frame*speed*.5);
  [160,320].forEach(x=>{ctx.beginPath();ctx.moveTo(x,GROUND_Y+2);ctx.lineTo(x,H);ctx.stroke();});
  ctx.setLineDash([]);
  const sh=ctx.createLinearGradient(0,0,W,0);
  sh.addColorStop(0,'transparent');sh.addColorStop(.5,'#ffffff1e');sh.addColorStop(1,'transparent');
  ctx.fillStyle=sh;ctx.fillRect(0,GROUND_Y,W,2);
}

// ── CHARACTER DRAW FUNCTIONS ─────────────────────────
function drawPrincess(cx,cy,fr){
  // فستان
  ctx.fillStyle='#f48fb1';ctx.shadowColor='#f48fb1';ctx.shadowBlur=10;
  ctx.beginPath();ctx.moveTo(cx-14,cy);ctx.lineTo(cx+14,cy);ctx.lineTo(cx+20,cy+38);ctx.lineTo(cx-20,cy+38);ctx.closePath();ctx.fill();
  // جسم
  ctx.fillStyle='#f8bbd0';ctx.beginPath();ctx.roundRect(cx-12,cy-20,24,22,6);ctx.fill();
  // رأس
  ctx.fillStyle='#ffccbc';ctx.shadowColor='#ffccbc';ctx.shadowBlur=8;
  ctx.beginPath();ctx.arc(cx,cy-32,13,0,Math.PI*2);ctx.fill();
  // شعر
  ctx.fillStyle='#ffd54f';
  ctx.beginPath();ctx.arc(cx,cy-38,13,Math.PI,0);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx-13,cy-32,4,8,-.3,0,Math.PI*2);ctx.fill();

  const x=LANE_X[c.lane],y=GROUND_Y+c.sy;

  ctx.save();

function spawnParticles(x,y,color,n=14){
  for(let i=0;i<n;i++){
    const a=(Math.PI*2/n)*i;
    particles.push({x,y,vx:Math.cos(a)*(2+Math.random()*4),vy:Math.sin(a)*(2+Math.random()*4),life:1,color,r:3+Math.random()*5});
  }
}
function updateParticles(){
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.life-=.035;
    ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;ctx.shadowBlur=0;
  particles=particles.filter(p=>p.life>0);
}

function checkLevelUp(){
  const lv=LEVELS[levelIdx];
  if(xp>=lv.xpNeeded&&levelIdx<LEVELS.length-1){
    levelIdx++;speed=LEVELS[levelIdx].speed;
    lives=5;updateHUD();
    document.getElementById('lvlup-text').textContent=`المرحلة ${levelIdx+1}: ${LEVELS[levelIdx].name} — قلوبك رجعت! ❤️❤️❤️❤️❤️`;
    const b=document.getElementById('lvlup-banner');
    b.classList.add('show');setTimeout(()=>b.classList.remove('show'),2500);
    showReward(LEVELS[levelIdx].name,`⬆️ مرحلة ${levelIdx+1}`,'🎉');
  }
}

function showReward(desc,title,icon){
  document.getElementById('r-icon').textContent=icon;
  document.getElementById('r-title').textContent=title;
  document.getElementById('r-desc').textContent=desc;
  const rp=document.getElementById('reward-popup');
  rp.classList.add('show');setTimeout(()=>rp.classList.remove('show'),2000);
}

// ── COLLISION ─────────────────────────────────────────
function getObHeight(type){
  const h={cactus:65,rock:44,boulder:60,ghost:55,fire_rock:56,lava:12,fire_car:72,meteor:56,alien:60,laser:80};
  return h[type]||60;
}
function checkCollisions(){
  const playerX=LANE_X[playerLane];
  const playerFeetY=GROUND_Y-jumpY;
  const playerHeadY=playerFeetY-80;
  if(!invincible){
    for(let i=obstacles.length-1;i>=0;i--){
      const ob=obstacles[i];
      if(ob.lane!==playerLane)continue;
      const obFeetY=GROUND_Y+ob.sy;
      const obHeadY=obFeetY-getObHeight(ob.type);
      const overlapY=playerFeetY>obHeadY&&playerHeadY<obFeetY;
      if(!overlapY)continue;
      if(jumpY>70)continue;
      spawnParticles(playerX,playerFeetY-40,'#ff4444');
      obstacles.splice(i,1);
      lives--;updateHUD();invincible=true;invTimer=130;
      if(lives<=0){endGame();return;}
    }
  }
  for(let i=coinItems.length-1;i>=0;i--){
    const c=coinItems[i];if(c.collected)continue;
    const cx=LANE_X[c.lane],cy=GROUND_Y+c.sy;
    const py=GROUND_Y-50-jumpY;
    if(Math.hypot(cx-playerX,cy-py)<40){
      c.collected=true;spawnParticles(cx,cy,'#f9a825',10);
      coins++;shopData.totalCoins++;saveShop();
      score+=15;xp+=10;updateHUD();checkLevelUp();
    }
  }
}

// ── OBSTACLES ─────────────────────────────────────────
function drawObstacle(ob){
  const x=LANE_X[ob.lane],y=GROUND_Y+ob.sy;
  ctx.save();
  if(ob.type==='cactus'){
    ctx.fillStyle='#2e7d32';ctx.shadowColor='#66bb6a';ctx.shadowBlur=8;
    ctx.fillRect(x-8,y-65,16,65);ctx.fillRect(x-28,y-48,22,10);ctx.fillRect(x+6,y-40,22,10);
  }else if(ob.type==='rock'){
    ctx.fillStyle='#78909c';ctx.shadowColor='#90a4ae';ctx.shadowBlur=6;
    ctx.beginPath();ctx.ellipse(x,y-22,28,22,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#b0bec5';ctx.beginPath();ctx.ellipse(x-5,y-30,13,9,-.3,0,Math.PI*2);ctx.fill();
  }else if(ob.type==='boulder'){
    ctx.fillStyle='#546e7a';ctx.shadowColor='#78909c';ctx.shadowBlur=8;
    ctx.beginPath();ctx.ellipse(x,y-30,36,30,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#78909c';ctx.beginPath();ctx.ellipse(x-8,y-40,16,12,-.4,0,Math.PI*2);ctx.fill();
  }else if(ob.type==='ghost'){
    ctx.fillStyle='#e1bee7cc';ctx.shadowColor='#ce93d8';ctx.shadowBlur=20;
    ctx.beginPath();ctx.arc(x,y-50,22,Math.PI,0);ctx.lineTo(x+22,y-20);
    ctx.quadraticCurveTo(x+14,y-28,x+6,y-20);ctx.quadraticCurveTo(x,y-28,x-6,y-20);
    ctx.quadraticCurveTo(x-14,y-28,x-22,y-20);ctx.closePath();ctx.fill();
    ctx.fillStyle='#6a1b9a';
    ctx.beginPath();ctx.arc(x-8,y-48,5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x+8,y-48,5,0,Math.PI*2);ctx.fill();
  }else if(ob.type==='fire_rock'){
    ctx.fillStyle='#bf360c';ctx.shadowColor='#ff6600';ctx.shadowBlur=20;
    ctx.beginPath();ctx.ellipse(x,y-28,30,28,0,0,Math.PI*2);ctx.fill();
    for(let i=0;i<5;i++){
      ctx.fillStyle=`hsl(${30+i*10},100%,${50+i*5}%)`;ctx.shadowColor='#ff6600';ctx.shadowBlur=15;
      ctx.beginPath();ctx.moveTo(x-10+i*5,y-50);
      ctx.quadraticCurveTo(x-8+i*5,y-62-Math.sin(frame*.15+i)*8,x-5+i*5,y-50);ctx.fill();
    }
  }else if(ob.type==='lava'){
    ctx.fillStyle='#4a0000';ctx.shadowColor='#ff3300';ctx.shadowBlur=15;
    ctx.fillRect(x-32,y-12,64,12);
    ctx.strokeStyle='#ff6600';ctx.lineWidth=3;ctx.shadowBlur=20;
    ctx.beginPath();ctx.moveTo(x-25,y-8);ctx.lineTo(x,y-2);ctx.lineTo(x+25,y-8);ctx.stroke();
  }else if(ob.type==='fire_car'){
    ctx.fillStyle='#b71c1c';ctx.shadowColor='#ff1744';ctx.shadowBlur=20;
    ctx.beginPath();ctx.roundRect(x-28,y-55,56,32,6);ctx.fill();
    ctx.fillStyle='#7f0000';ctx.beginPath();ctx.roundRect(x-20,y-72,40,22,4);ctx.fill();
    ctx.fillStyle='#ff9800aa';
    for(let i=0;i<4;i++){ctx.beginPath();ctx.arc(x-12+i*8,y-76-Math.sin(frame*.2+i)*5,4,0,Math.PI*2);ctx.fill();}
    ctx.fillStyle='#212121';
    [x-18,x+18].forEach(wx=>{
      ctx.beginPath();ctx.arc(wx,y-4,11,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ff1744';ctx.beginPath();ctx.arc(wx,y-4,5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#212121';
    });
  }else if(ob.type==='meteor'){
    ctx.fillStyle='#4a148c';ctx.shadowColor='#9c27b0';ctx.shadowBlur=25;
    ctx.beginPath();ctx.arc(x,y-30,26,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#ce93d855';ctx.lineWidth=8;
    ctx.beginPath();ctx.moveTo(x-30,y-58);ctx.lineTo(x+30,y-2);ctx.stroke();
  }else if(ob.type==='alien'){
    ctx.fillStyle='#00695c';ctx.shadowColor='#00e676';ctx.shadowBlur=20;
    ctx.beginPath();ctx.ellipse(x,y-40,32,18,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#004d40';ctx.beginPath();ctx.ellipse(x,y-25,20,20,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#00e67688';ctx.beginPath();ctx.arc(x,y-38,10,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#00e67622';
    ctx.beginPath();ctx.moveTo(x-12,y-22);ctx.lineTo(x+12,y-22);ctx.lineTo(x+20,y);ctx.lineTo(x-20,y);ctx.closePath();ctx.fill();
  }else if(ob.type==='laser'){
    ctx.fillStyle='#0d47a1';ctx.shadowColor='#40c4ff';ctx.shadowBlur=15;

    ctx.fillStyle='#40c4ff';ctx.shadowBlur=30;ctx.fillRect(x-2,y-80,4,80);
    ctx.fillStyle='#40c4ffaa';
    for(let i=0;i<4;i++){ctx.beginPath();ctx.arc(x,y-70+i*22,5+Math.sin(frame*.15+i)*2,0,Math.PI*2);ctx.fill();}
  }
  ctx.restore();
}

// ── CONTROLS ─────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(!gameRunning||gamePaused)return;
  if(e.key==='ArrowLeft'&&playerLane>0)playerLane--;
  if(e.key==='ArrowRight'&&playerLane<2)playerLane++;
  if((e.key==='ArrowUp'||e.key===' ')&&!jumping)doJump();
  if(e.key==='Escape')togglePause();
  e.preventDefault();
});
canvas.addEventListener('touchstart',e=>{
  if(!gameRunning||gamePaused)return;
  touchStartX=e.touches[0].clientX;
  touchStartY=e.touches[0].clientY;
},{passive:true});
canvas.addEventListener('touchend',e=>{
  if(!gameRunning||gamePaused||touchStartX===null)return;
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  const adx=Math.abs(dx),ady=Math.abs(dy);
  if(adx>40&&adx>ady){
    if(dx<0&&playerLane>0)playerLane--;
    else if(dx>0&&playerLane<2)playerLane++;
  }else if(ady>40&&ady>adx){
    if(dy<0&&!jumping)doJump();
  }else if(adx<15&&ady<15){
    if(!jumping)doJump();
  }
  touchStartX=null;touchStartY=null;
},{passive:true});
function doJump(){jumping=true;jumpV=18;}

// ── GAME LOOP ─────────────────────────────────────────
let lastTime=0;

function gameLoop(timestamp){
  if(!gameRunning||gamePaused)return;
  // delta time بالثواني، مقيد بـ 50ms عشان ما يحصل قفز كبير
  const delta=Math.min((timestamp-lastTime)/1000, 0.05);
  lastTime=timestamp;
  // نحول السرعة لـ pixels/second (×60 عشان تكون مكافئة للقيم القديمة)
  const spd=speed*60*delta;

  frame++;
  loopId=requestAnimationFrame(gameLoop);
  if(frame%10===0){xp+=3;updateHUD();checkLevelUp();}
  score++;if(frame%6===0)updateHUD();
  if(invincible){invTimer--;if(invTimer<=0)invincible=false;}
  if(jumping){jumpY+=jumpV;jumpV-=1.1;if(jumpY<=0){jumpY=0;jumpV=0;jumping=false;}}
  speed=LEVELS[levelIdx].speed;
  const si=Math.max(42,LEVELS[levelIdx].spawnRate-frame/350);
  if(frame-lastOb>si+Math.random()*25){spawnOb();lastOb=frame;}
  if(frame-lastCoin>si*1.3+Math.random()*35){spawnCoins();lastCoin=frame;}
  obstacles.forEach(o=>o.sy+=spd);
  coinItems.forEach(c=>c.sy+=spd);
  obstacles=obstacles.filter(o=>o.sy<85);
  coinItems=coinItems.filter(c=>c.sy<85);
  checkCollisions();
  drawBg();drawGround();
  obstacles.forEach(o=>drawObstacle(o));
  coinItems.forEach(c=>drawCoin(c));
  drawPlayer();
  updateParticles();
}

function endGame(){
  gameRunning=false;
  if(loopId){cancelAnimationFrame(loopId);loopId=null;}
  document.getElementById('pause-btn').style.display='none';
  const lb=saveLB(score,levelIdx+1);
  document.getElementById('go-score').textContent=score;
  document.getElementById('go-best').textContent=lb[0]?.score||score;
  document.getElementById('go-coins').textContent=coins;
  document.getElementById('go-level').textContent=levelIdx+1;
  document.getElementById('go-title').textContent=score>=5000?'🏆 أداء رهيب!':score>=2000?'🌟 ممتاز!':'💥 انتهت اللعبة';
  showScreen('gameover-screen');
}

function renderLB(){
  const lb=getLB();
  const medals=['🥇','🥈','🥉'];
  const cls=['gold','silver','bronze'];
  const el=document.getElementById('lb-list');
  if(!lb.length){el.innerHTML='<div style="color:#880e4f;text-align:center;padding:30px">لا توجد نتائج بعد — العب أول!</div>';return;}
  el.innerHTML=lb.map((e,i)=>`<div class="lb-row ${cls[i]||''}"><span class="lb-rank">${medals[i]||`${i+1}`}</span><span class="lb-name">مرحلة ${e.level} — ${e.date||''}</span><span class="lb-pts">${e.score}</span></div>`).join('');
}

function showScreen(id){
  ['menu-screen','lb-screen','gameover-screen','pause-screen','shop-screen'].forEach(s=>{
    const el=document.getElementById(s);
    if(id===null||s!==id)el.classList.add('hidden');
    else el.classList.remove('hidden');
  });
}

function togglePause(){
  if(!gameRunning)return;
  gamePaused=!gamePaused;
  if(gamePaused){
    if(loopId){cancelAnimationFrame(loopId);loopId=null;}
    showScreen('pause-screen');
    document.getElementById('pause-btn').textContent='▶';
  }else{
    showScreen(null);
    document.getElementById('pause-btn').textContent='⏸';
    lastTime=performance.now();
    loopId=requestAnimationFrame(gameLoop);
  }
}

function startGame(){
  if(loopId){cancelAnimationFrame(loopId);loopId=null;}
  init();gameRunning=true;lastTime=performance.now();
  document.getElementById('pause-btn').style.display='flex';
  document.getElementById('pause-btn').textContent='⏸';
  loopId=requestAnimationFrame(gameLoop);
}

function drawCharOnCtx(targetCtx,def,cx,cy,fr){
  // swap the global ctx temporarily
  const real=ctx;

  // نستخدم offscreen approach
  const off=new OffscreenCanvas(100,100);
  const offCtx=off.getContext('2d');
  // نحتاج نبدل ctx المستخدم في دوال الرسم
  // الحل: نعيد تعريف مؤقت
  window.__previewCtx=targetCtx;
  def.draw(cx,cy,fr);
}

// دوال رسم الـ preview على أي ctx
function drawCharPreview(pctx,def,cx,cy,fr){
  // نحتاج نرسم بنفس المنطق لكن على pctx
  // نستخدم OffscreenCanvas trick
  const names={
    princess:drawPrincessOn,fairy:drawFairyOn,fox:drawFoxOn,cat:drawCatOn,
    astronaut:drawAstronautOn,star:drawStarOn,mermaid:drawMermaidOn,butterfly:drawButterflyOn
  };
  const fn=names[def.id];
  if(fn)fn(pctx,cx,cy,fr);
}
function drawCoinPreview(pctx,def,x,y,fr){
  if(def.id==='coin'){
    pctx.shadowColor='#ffb3c1';pctx.shadowBlur=12;pctx.fillStyle='#ffb3c1';
    pctx.beginPath();pctx.arc(x,y,13,0,Math.PI*2);pctx.fill();
    pctx.fillStyle='#ffffff88';pctx.beginPath();pctx.arc(x-3,y-4,5,0,Math.PI*2);pctx.fill();
    pctx.shadowBlur=0;
  }else{
    pctx.shadowColor='#f48fb1';pctx.shadowBlur=12;
    pctx.fillStyle='#f8bbd0';pctx.beginPath();pctx.arc(x,y,13,0,Math.PI*2);pctx.fill();
    pctx.fillStyle='#f48fb1';
    pctx.beginPath();pctx.arc(x,y,11,Math.PI*1.2,Math.PI*.2);
    pctx.arc(x,y,5,Math.PI*.2,Math.PI*1.2,true);pctx.closePath();pctx.fill();
    pctx.fillStyle='#fce4ec';pctx.shadowBlur=0;
    pctx.beginPath();pctx.arc(x,y,5,0,Math.PI*2);pctx.fill();
    const sp=[{dx:-5,dy:-3,c:'#fff176'},{dx:4,dy:-5,c:'#80deea'},{dx:5,dy:3,c:'#ce93d8'},{dx:-3,dy:4,c:'#fff176'}];
    sp.forEach(s=>{
      pctx.fillStyle=s.c;pctx.save();pctx.translate(x+s.dx,y+s.dy);pctx.rotate(.3);
      pctx.fillRect(-3,-1,6,2);pctx.restore();
    });
  }
}

// نسخ كل دالة رسم شخصية على pctx
function drawPrincessOn(c,cx,cy,fr){
  c.fillStyle='#f48fb1';c.shadowColor='#f48fb1';c.shadowBlur=10;
  c.beginPath();c.moveTo(cx-14,cy);c.lineTo(cx+14,cy);c.lineTo(cx+20,cy+38);c.lineTo(cx-20,cy+38);c.closePath();c.fill();
  c.fillStyle='#f8bbd0';c.beginPath();c.roundRect(cx-12,cy-20,24,22,6);c.fill();
  c.fillStyle='#ffccbc';c.shadowColor='#ffccbc';c.shadowBlur=8;
  c.beginPath();c.arc(cx,cy-32,13,0,Math.PI*2);c.fill();
  c.fillStyle='#ffd54f';
  c.beginPath();c.arc(cx,cy-38,13,Math.PI,0);c.fill();
  c.beginPath();c.ellipse(cx-13,cy-32,4,8,-.3,0,Math.PI*2);c.fill();
  c.beginPath();c.ellipse(cx+13,cy-32,4,8,.3,0,Math.PI*2);c.fill();
  c.fillStyle='#f9a825';c.shadowColor='#f9a825';c.shadowBlur=12;
  c.beginPath();c.moveTo(cx-8,cy-46);c.lineTo(cx-5,cy-52);c.lineTo(cx,cy-55);c.lineTo(cx+5,cy-52);c.lineTo(cx+8,cy-46);c.closePath();c.fill();
  c.shadowBlur=0;c.fillStyle='#333';
  c.beginPath();c.arc(cx-4,cy-34,2.5,0,Math.PI*2);c.fill();
  c.beginPath();c.arc(cx+4,cy-34,2.5,0,Math.PI*2);c.fill();
}
function drawFairyOn(c,cx,cy,fr){

function drawStarOn(c,cx,cy,fr){
  c.save();c.translate(cx,cy-15);

  c.beginPath();
  for(let i=0;i<5;i++){
    const a=(i*Math.PI*2/5)-Math.PI/2,b=a+Math.PI/5;
    c.lineTo(Math.cos(a)*28,Math.sin(a)*28);c.lineTo(Math.cos(b)*12,Math.sin(b)*12);

  c.closePath();c.fill();
  c.fillStyle='#f9a825';c.shadowBlur=0;c.beginPath();c.arc(0,0,8,0,Math.PI*2);c.fill();

}
